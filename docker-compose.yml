version: '3.8'

services:

  postgres:
    image: postgres:15
    container_name: finguard-postgres
    environment:
      POSTGRES_DB: finguard
      POSTGRES_USER: finguard_user
      POSTGRES_PASSWORD: finguard_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

  backend:
    build: ./backend
    container_name: finguard-backend
    ports:
      - "8080:8080"
    environment:
      SPRING_DATASOURCE_URL: jdbc:postgresql://postgres:5432/finguard
      SPRING_DATASOURCE_USERNAME: finguard_user
      SPRING_DATASOURCE_PASSWORD: finguard_pass
      JWT_SECRET: finguard-super-secret-key-change-this-in-production
    depends_on:
      - postgres

volumes:
  postgres_data: