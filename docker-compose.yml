services:
  postgres:
    image: postgres:15
    container_name: finguard-postgres
    environment:
      POSTGRES_DB: finguard
      POSTGRES_USER: finguard_user
      POSTGRES_PASSWORD: finguard_pass
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: