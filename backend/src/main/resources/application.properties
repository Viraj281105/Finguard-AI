spring.application.name=backend

# Database
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5432/finguard?TimeZone=UTC}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:finguard_user}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:finguard_pass}
spring.datasource.driver-class-name=org.postgresql.Driver

# JPA
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.dialect=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.properties.hibernate.jdbc.time_zone=UTC

# JWT
jwt.secret=${JWT_SECRET:finguard-super-secret-key-change-this-in-production}
jwt.expiration=900000
jwt.refresh-expiration=604800000

# Server
server.port=8080